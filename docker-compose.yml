services:
  gateway_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gateway_agent
    restart: unless-stopped
    command: python -m src.gateway.main
    ports:
      - "8000:8000"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.10
      isolated_ai_bridge:
        ipv4_address: 172.22.0.10
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    env_file:
      - .env
    environment:
      - MODULE_NAME=GatewayAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - EXTERNAL_AI_TOKEN=${EXTERNAL_AI_TOKEN:-}
      - QR_SCAN_INTERVAL_SEC=1.0
      - QR_DEBOUNCE_SEC=30.0
      - DEFAULT_TARGET={}
      - DEVICE_MASTER_URL=http://device_master_agent:8005
    volumes:
      - /sys/class/thermal:/sys/class/thermal:ro
    depends_on:
      camera_agent:
        condition: service_healthy
      device_master_agent:
        condition: service_started

  inference_agent:
    build:
      context: .
      dockerfile: Dockerfile.inference
    container_name: inference_agent
    restart: unless-stopped
    command: python -m src.inference.main
    expose:
      - "8001"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.11

    # Hailo-8 NPU device access (PCIe M.2)
    privileged: true
    devices:
      - /dev/hailo0:/dev/hailo0

    # Hailo SDK uses POSIX SHM internally for DMA buffer sharing
    shm_size: '512mb'
    mem_limit: '2g'
    memswap_limit: '2g'

    ulimits:
      nofile:
        soft: 65535
        hard: 65535

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    environment:
      - MODULE_NAME=InferenceAgent
      - HAILO_DEVICE=/dev/hailo0
      - HEF_PATH=/app/models/surgeonet_416.hef
      # - LABELS_PATH=/app/models/labels.json
      # - INPUT_SIZE=416
      # - CONF_THRESHOLD=0.35
      # - IOU_THRESHOLD=0.45
      # - SKIP_BACKGROUND=true
      - TEMP_WARNING_CELSIUS=85.0
      - TEMP_CRITICAL_CELSIUS=95.0
      - INFERENCE_TIMEOUT_SEC=10
      - PYTHONUNBUFFERED=1

    volumes:
      - ./src:/app/src:ro
      - ./models:/app/models:ro
      - /usr/lib/python3/dist-packages/hailo_platform:/app/hailo_platform:ro
      - /usr/lib/libhailort.so.4.20.0:/usr/lib/libhailort.so.4.20.0:ro
      - /usr/lib/libhailort.so:/usr/lib/libhailort.so:ro

  camera_agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: camera_agent
    restart: unless-stopped
    command: python -m src.camera.main
    expose:
      - "8002"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.12
    devices:
      - /dev/video0:/dev/video0
    healthcheck:
      # Hit /frame (not /health) — proves an actual camera frame is available
      test: [ "CMD", "curl", "-f", "http://localhost:8002/frame", "-o", "/dev/null" ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    env_file:
      - .env
    environment:
      - MODULE_NAME=CameraAgent
      - CAMERA_INDEX=0
      - CAMERA_WIDTH=1920
      - CAMERA_HEIGHT=1080
      - CAMERA_FPS=30

  firebase_sync_agent:
    build:
      context: .
      dockerfile: Dockerfile.firebase_sync
    container_name: firebase_sync_agent
    restart: unless-stopped
    command: python -m src.firebase_sync.main
    expose:
      - "8004"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.14
    env_file:
      - .env
    environment:
      - MODULE_NAME=FirebaseSyncAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - PROJECT_ID=${PROJECT_ID:-}
      - DISPLAY_URL=http://display_agent:8003
      - GATEWAY_URL=http://gateway_agent:8000
    volumes:
      - ./data:/app/data:rw
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8004/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  display_agent:
    build:
      context: .
      dockerfile: Dockerfile.display
    container_name: display_agent
    restart: unless-stopped
    command: python -m src.display.main
    depends_on:
      camera_agent:
        condition: service_healthy
    expose:
      - "8003"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.13
    # ipc: host shares the host IPC namespace, enabling X11 MIT-SHM shared memory.
    # This avoids copying the full ~6MB frame over the X11 socket on every render,
    # which is the primary cause of low display FPS in a Docker container.
    ipc: host
    environment:
      - MODULE_NAME=DisplayAgent
      - DISPLAY=:0
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - DISPLAY_FPS=30
      - DISPLAY_HEADLESS=false
      - CAMERA_URL=http://camera_agent:8002
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/root/.Xauthority:ro
    devices:
      - /dev/dri:/dev/dri
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8003/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  device_master_agent:
    build:
      context: .
      dockerfile: Dockerfile.device_master
    container_name: device_master_agent
    restart: unless-stopped
    command: python -m src.device_master.main
    expose:
      - "8005"
    ports:
      - "8005:8005"
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.15
    environment:
      - MODULE_NAME=DeviceMasterAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - DEVICE_CACHE_PATH=/app/data/device_cache.json
      - DEVICE_CACHE_TTL_HOURS=168
    volumes:
      - ./data:/app/data
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8005/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 3rd Party AI Container Template ─────────────────────────────────────────
  # Assign ONLY to isolated_ai_bridge (never antigravity_bridge).
  # This guarantees zero outbound internet — vendor cannot exfiltrate patient images.
  # Gateway reaches it at http://172.20.1.X:PORT from its isolated_ai_bridge interface.
  #
  # third_party_ai:
  #   image: vendor/model:latest
  #   container_name: third_party_ai
  #   expose:
  #     - "8006"
  #   networks:
  #     isolated_ai_bridge:
  #       ipv4_address: 172.22.0.16
  #   environment:
  #     - MODEL_PATH=/models/vendor.model
  # ─────────────────────────────────────────────────────────────────────────────

networks:
  antigravity_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  # Air-gapped network for 3rd party AI containers.
  # internal: true removes the default gateway — no outbound internet access.
  # DNS lookups to external servers also fail (network-layer cut, not a firewall rule).
  # Gateway is dual-homed: antigravity_bridge (Firebase/Camera) + isolated_ai_bridge (3rd party).
  # 3rd party containers must be assigned ONLY to isolated_ai_bridge.
  isolated_ai_bridge:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.22.0.0/24
