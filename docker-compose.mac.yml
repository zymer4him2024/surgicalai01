networks:
  antigravity_bridge:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

services:
  gateway_agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.gateway.main
    container_name: gateway_agent
    environment:
      - MODULE_NAME=GatewayAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - EXTERNAL_AI_TOKEN=${EXTERNAL_AI_TOKEN:-}
      - QR_SCAN_INTERVAL_SEC=1.0
      - QR_DEBOUNCE_SEC=30.0
      - DEFAULT_TARGET={}
      - DEVICE_MASTER_URL=http://device_master_agent:8005
      - INFERENCE_URL=http://mock_external_ai:8006
      - INFERENCE_ENDPOINT=/predict
    depends_on:
      - device_master_agent
      - mock_external_ai
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8000/health
      timeout: 10s
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.10
    ports:
      - 8000:8000
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  inference_agent:
    build:
      context: .
      dockerfile: Dockerfile.inference
    command: python -m src.inference.main
    container_name: inference_agent
    environment:
      - MODULE_NAME=InferenceAgent
      - HAILO_DEVICE=/dev/null
      - HEF_PATH=/app/models/simulation.hef
      - TEMP_WARNING_CELSIUS=85.0
      - TEMP_CRITICAL_CELSIUS=95.0
      - INFERENCE_TIMEOUT_SEC=10
      - PYTHONUNBUFFERED=1
    expose:
      - '8001'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 20s
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8001/health
      timeout: 10s
    mem_limit: 2g
    memswap_limit: 2g
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.11
    restart: unless-stopped
    shm_size: 512mb
    ulimits:
      nofile:
        hard: 65535
        soft: 65535
    volumes:
      - ./src:/app/src:ro
      - ./models:/app/models:ro

  camera_agent:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m src.camera.main
    container_name: camera_agent
    env_file:
      - .env
    environment:
      - MODULE_NAME=CameraAgent
      - CAMERA_INDEX=0
    expose:
      - '8002'
    healthcheck:
      interval: 30s
      retries: 3
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8002/health
      timeout: 10s
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.12
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  firebase_sync_agent:
    build:
      context: .
      dockerfile: Dockerfile.firebase_sync
    command: python -m src.firebase_sync.main
    container_name: firebase_sync_agent
    env_file:
      - .env
    environment:
      - MODULE_NAME=FirebaseSyncAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - PROJECT_ID=${PROJECT_ID:-}
      - DISPLAY_URL=http://display_agent:8003
      - GATEWAY_URL=http://gateway_agent:8000
      - QUEUE_DB_PATH=/app/data/queue.db
      - QUEUE_POLL_SEC=5
    ports:
      - "8004:8004"
    expose:
      - '8004'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 10s
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8004/health
      timeout: 10s
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.14
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro
      - ./data:/app/data
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro
    depends_on:
      - display_agent

  display_agent:
    build:
      context: .
      dockerfile: Dockerfile.display
    command: python -m src.display.main
    container_name: display_agent
    environment:
      - MODULE_NAME=DisplayAgent
      - DISPLAY_HEADLESS=true
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - DISPLAY_FPS=30
    expose:
      - '8003'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 5s
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8003/health
      timeout: 10s
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.13
    restart: unless-stopped
    volumes:
      - ./src:/app/src:ro

  device_master_agent:
    build:
      context: .
      dockerfile: Dockerfile.device_master
    command: python -m src.device_master.main
    container_name: device_master_agent
    environment:
      - MODULE_NAME=DeviceMasterAgent
      - APP_ID=${APP_ID}
      - DEVICE_ID=${DEVICE_ID}
      - DEVICE_CACHE_PATH=/app/data/device_cache.json
      - DEVICE_CACHE_TTL_HOURS=168
    expose:
      - '8005'
    ports:
      - '8005:8005'
    healthcheck:
      interval: 30s
      retries: 3
      start_period: 15s
      test:
        - CMD
        - curl
        - -f
        - http://localhost:8005/health
      timeout: 10s
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.15
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./firebase-credentials.json:/app/firebase-credentials.json:ro

  mock_external_ai:
    build:
      context: .
      dockerfile: Dockerfile.mock_external_ai
    container_name: mock_external_ai
    restart: unless-stopped
    ports:
      - "8006:8006"
    environment:
      - MODULE_NAME=MockExternalAI
    volumes:
      - ./src:/app/src:ro
    networks:
      antigravity_bridge:
        ipv4_address: 172.20.0.16
